<!DOCTYPE html>
<html lang="zh">
    <head>
        <title>moomoo网站！ - 主页</title>
        <style>
            .link_style{
                background-color: palegreen;
                color: skyblue;
                padding: 20px 20px;
                text-decoration: none;
            }
        </style>
        <script>
            var s;
            function getCode(){
                s = Math.floor(Math.random() * 100000) + 1;
                window.alert("你的验证码是：" + s + "，不要告诉其他moo！");
            }
            function check(){
                var n = document.getElementById("username").value;
                var p = document.getElementById("userpassword").value;
                var v = document.getElementById("verify_code").value;
                if (v != s) window.alert("验证码错误");
                else if (n != "little_moo" && n != "middle_moo" && n != "cow_moo" && n != "ox_moo") window.alert("没有找到用户moo！");
                else if (p != 123456) window.alert("密码错误");
                else {
                    window.alert("登录成功！"); 
                    window.location.href='./index.html';
                }
            }
        </script>
    </head>
    <body>
        <div class width="800" height="80" id="top">
            <a href="./index.html" style="text-decoration: none;">
                <span><img src="./moo1.png" alt="moo!(Picture)" width="100" height="75"></img></span>
            </a>
            <a href="./index.html" class="link_style">主页</a>
            <a href="./house.html" class="link_style">moo窝</a>
            <a href="./login.html" class="link_style">登录</a>
            <a href="./register.html" class="link_style">注册</a>
            </div>
        </div>
        <br>
        <div class id="main" style="text-align: center;">
            <img src="./moo2.png" alt="moo!(Picture)" width="200" height="150"></img>
            <div style="font-size: 30px;">登录moo！</div>
            <input placeholder="moo的用户名" id="username"></input>
            <br>
            <input placeholder="moo的密码（不准看！）" type="password" id="userpassword"></input>
            <br>
            <input placeholder="moo的验证码！" id="verify_code"></input>
            <button onclick="getCode()">获取验证码</button>
            <br>
            <button onclick="check()" style="background-color: palegreen;">登录moo!</button>
            <br>
            <a href="./register.html" style="color: skyblue; text-decoration: none;">没有moo账号？立即注册！</a>
        </div>
    </body>
</html>
